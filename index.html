<!DOCTYPE html>
<html>
<head>
<title>ECR Group Techsupport</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">

<style>
  /* 1. Basic Page Reset */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; /* Prevents double scrollbars */
    font-family: sans-serif;
  }

  /* 2. Iframe Styling */
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* 3. Loader Container */
  #loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #ffffff;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s ease;
  }

  /* 4. The Spinner Animation */
  .spinner {
    border: 5px solid #f3f3f3; /* Light grey */
    border-top: 5px solid #3498db; /* Blue */
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
</div>

<div id="it-support-widget" style="width: 100%; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
  
  <iframe 
    id="desktop-iframe"
    src="YOUR_WEB_APP_URL_HERE" 
    width="100%" 
    height="800px" 
    frameborder="0" 
    style="border: none; display: block;">
  </iframe>

  <div id="mobile-fallback" style="display: none; background-color: #f8fafc; padding: 40px 20px; text-align: center;">
    <svg style="width: 48px; height: 48px; color: #3b82f6; margin-bottom: 15px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
    <h3 style="margin: 0 0 10px 0; font-family: sans-serif; color: #1e293b;">IT Support Portal</h3>
    <p style="margin: 0 0 20px 0; color: #64748b; font-family: sans-serif; font-size: 16px;">For security purposes, mobile users must open the portal in a secure window.</p>
    
    <a href="YOUR_WEB_APP_URL_HERE" target="_blank" style="display: inline-block; background-color: #1976d2; color: white; padding: 12px 24px; border-radius: 4px; text-decoration: none; font-family: sans-serif; font-weight: bold; font-size: 16px;">
      Open Support System
    </a>
  </div>

</div>

<script>
  // Check if the user is on a mobile device
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

  if (isMobile) {
    // If on mobile, hide the iframe and show the button
    document.getElementById('desktop-iframe').style.display = 'none';
    document.getElementById('mobile-fallback').style.display = 'block';
  }
</script>

<script>
  // Function to hide the loader when the iframe reports it is loaded
  function hideLoader() {
    var loader = document.getElementById('loader');
    
    // Slight delay to ensure the visual rendering is caught up
    setTimeout(function() {
      loader.style.opacity = '0'; // Fade out
      
      // Remove from display flow after fade
      setTimeout(function() {
        loader.style.display = 'none';
      }, 500);
    }, 500);
  }
</script>

</body>
</html>
